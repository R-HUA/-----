<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>服务工作台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">D</div>
          <div>
            <h1>服务工作台</h1>
            <p>统一访问入口</p>
          </div>
        </div>

        <div class="sidebar-actions">
          <button id="addServiceButton" class="primary-button" type="button">
            <span aria-hidden="true">+</span>
            新增服务
          </button>
          <button id="refreshButton" class="icon-button" type="button" title="刷新服务列表" aria-label="刷新服务列表">
            <span aria-hidden="true">↻</span>
          </button>
        </div>

        <div class="search-box">
          <input id="serviceSearch" type="search" placeholder="搜索服务">
        </div>

        <nav id="serviceList" class="service-list" aria-label="服务列表"></nav>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div id="tabs" class="tabs" role="tablist" aria-label="已打开服务"></div>
          <div class="workspace-actions">
            <button id="reloadTabButton" class="icon-button" type="button" title="刷新当前页" aria-label="刷新当前页">
              <span aria-hidden="true">↻</span>
            </button>
            <button id="openExternalButton" class="icon-button" type="button" title="在新窗口打开代理地址" aria-label="在新窗口打开代理地址">
              <span aria-hidden="true">↗</span>
            </button>
          </div>
        </header>

        <section id="emptyState" class="empty-state">
          <h2>选择一个服务开始</h2>
          <p>左侧列表为空时，可以先新增服务。</p>
        </section>

        <section id="frameHost" class="frame-host" aria-label="服务页面"></section>
      </main>
    </div>

    <dialog id="serviceDialog" class="service-dialog">
      <form id="serviceForm" method="dialog">
        <div class="dialog-header">
          <h2 id="dialogTitle">新增服务</h2>
          <button id="closeDialogButton" class="icon-button" type="button" aria-label="关闭">
            <span aria-hidden="true">×</span>
          </button>
        </div>

        <label>
          <span>名称</span>
          <input id="serviceNameInput" name="name" required maxlength="80" autocomplete="off">
        </label>

        <label>
          <span>服务 ID</span>
          <input id="serviceIdInput" name="id" maxlength="64" autocomplete="off" placeholder="留空时按名称生成">
        </label>

        <label>
          <span>后端访问地址</span>
          <input id="serviceUrlInput" name="url" required inputmode="url" placeholder="http://10.0.0.12:8080">
        </label>

        <label>
          <span>描述</span>
          <textarea id="serviceDescriptionInput" name="description" rows="3"></textarea>
        </label>

        <label class="toggle-row">
          <input id="serviceEnabledInput" name="enabled" type="checkbox" checked>
          <span>启用服务</span>
        </label>

        <p id="formError" class="form-error" role="alert"></p>

        <div class="dialog-actions">
          <button id="deleteServiceButton" class="danger-button" type="button">删除</button>
          <div class="dialog-action-group">
            <button id="cancelServiceButton" class="secondary-button" type="button">取消</button>
            <button class="primary-button" type="submit">保存</button>
          </div>
        </div>
      </form>
    </dialog>

    <script src="/app.js" defer></script>
  </body>
</html>
